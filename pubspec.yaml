name: dark_horizon
description: "A new Flutter project for Electrical Engineering Lectures."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  video_player: ^2.8.2
  pod_player: ^0.2.2
  flutter_downloader: ^1.11.6
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  wakelock_plus: ^1.1.4
  youtube_explode_dart: ^2.2.2
  device_info_plus: ^10.1.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  connectivity_plus: ^6.0.3
  open_filex: any
  path: ^1.9.0
  http: ^1.2.1
  url_launcher: ^6.2.5
  get: ^4.6.6
  screen_brightness: ^1.0.1
  flutter_volume_controller: ^1.2.1
  screen_protector: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21

dependency_overrides:
  win32: ^5.1.1
  open_filex: any

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
